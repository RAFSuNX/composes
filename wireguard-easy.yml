version: '3.8'

services:
  wg-easy:
    hostname: wgeasy
    image: ghcr.io/wg-easy/wg-easy
    container_name: wg-easy
    environment:
      - LANG=en  
      - WG_HOST=***********  
      - PASSWORD_HASH=$$2y$$10$$*********************  #use duble $ on your password hash
      - PORT=51821  
      - WG_PORT=51820  
    volumes:
      - ~/.wg-easy:/etc/wireguard  
      # - /lib/modules:/lib/modules  # its required on alpine linux, ubuntu does not.
    ports:
      - "51820:51820/udp"  
      # - "51821:51821/tcp"  
    cap_add:
      - NET_ADMIN  
      - SYS_MODULE
    sysctls:
      - 'net.ipv4.conf.all.src_valid_mark=1'
      - 'net.ipv4.ip_forward=1'
    restart: unless-stopped  
    networks:
      - cloudflared  
    privileged: true  

networks:
  cloudflared:
    external: true  

volumes:
  wg-easy-config:
    driver: local  
